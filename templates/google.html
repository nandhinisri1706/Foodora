<!DOCTYPE html>
<html>
<head>
    <title>Google Sign In - Foodoraa</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial, sans-serif;

            background:#0f172a;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;

            color:white;
        }

        /* LOGIN BOX */

        .google-box{

            width:400px;

            padding:35px;

            border-radius:20px;

            background:rgba(255,255,255,0.08);

            border:1px solid rgba(255,255,255,0.2);

            backdrop-filter:blur(12px);

            text-align:center;

            box-shadow:
            0 0 20px rgba(57,255,20,0.2);
        }

        .google-box:hover{

            box-shadow:
            0 0 20px #39FF14,
            0 0 40px rgba(57,255,20,0.4);
        }

        h1{

            color:#39FF14;

            margin-bottom:20px;

            text-shadow:
            0 0 10px #39FF14,
            0 0 20px #39FF14;
        }

        p{
            color:#d1d5db;
            margin-bottom:25px;
        }

        /* INPUT */

        input{

            width:90%;

            padding:14px;

            border-radius:12px;

            border:1px solid #39FF14;

            background:#111827;

            color:white;

            outline:none;

            font-size:15px;
        }

        input:focus{

            box-shadow:
            0 0 15px #39FF14;
        }

        /* BUTTON */

        button{

            width:95%;

            padding:14px;

            margin-top:20px;

            border:none;

            border-radius:12px;

            background:linear-gradient(to right,#39FF14,#00E5FF);

            color:black;

            font-size:16px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;

            box-shadow:
            0 0 15px #39FF14;
        }

        button:hover{

            transform:scale(1.03);

            box-shadow:
            0 0 20px #39FF14,
            0 0 40px #00E5FF;
        }

        /* GOOGLE ICON */

        .icon{

            font-size:50px;

            margin-bottom:15px;
        }

    </style>

</head>

<body>

    <div class="google-box">

        <div class="icon">
            🔵
        </div>

        <h1>Continue with Google</h1>

        <p>
            Sign in using your Gmail account
        </p>

        <form action="/userinfo">

            <input
            type="email"
            placeholder="Enter Gmail Address"
            required>

            <br>

            <button type="submit">
                Continue 🚀
            </button>

        </form>

    </div>

</body>
</html>
